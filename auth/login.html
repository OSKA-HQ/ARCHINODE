<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In | ARCHINODE</title>
<link rel="icon" type="image/x-icon" href="../favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; flex-direction: column; }

.auth-header {
    background: #0a0a0a; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
}
.auth-header .logo { color: #fff; font-size: 1.3rem; font-weight: 800; text-decoration: none; letter-spacing: -0.5px; }
.auth-header .logo span { font-size: 0.6rem; font-weight: 400; color: #666; margin-left: 4px; }
.auth-header .nav-link { color: #999; font-size: 0.82rem; text-decoration: none; }
.auth-header .nav-link:hover { color: #C8A96E; }

.auth-container {
    flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px;
}
.auth-box {
    background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    padding: 48px 40px; max-width: 420px; width: 100%;
}
.auth-box h1 { font-size: 1.6rem; font-weight: 800; color: #111; margin-bottom: 6px; }
.auth-box .subtitle { font-size: 0.88rem; color: #999; margin-bottom: 28px; }

.field { margin-bottom: 20px; }
.field label { display: block; font-size: 0.82rem; font-weight: 600; color: #333; margin-bottom: 6px; }
.field input {
    width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 6px;
    font-size: 0.95rem; font-family: inherit; transition: border-color 0.3s;
}
.field input:focus { outline: none; border-color: #C8A96E; }

.auth-btn {
    width: 100%; background: #111; color: #fff; border: none; padding: 14px;
    border-radius: 6px; font-size: 0.95rem; font-weight: 600; cursor: pointer;
    transition: background 0.3s; font-family: inherit; margin-top: 8px;
}
.auth-btn:hover { background: #C8A96E; }
.auth-btn:disabled { background: #999; cursor: not-allowed; }

.auth-links { text-align: center; margin-top: 20px; font-size: 0.82rem; color: #999; line-height: 1.8; }
.auth-links a { color: #C8A96E; text-decoration: none; }
.auth-links a:hover { text-decoration: underline; }

.error-msg {
    display: none; background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
    padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 0.85rem;
}
.success-msg {
    display: none; background: #f0fdf4; border: 1px solid #bbf7d0; color: #16a34a;
    padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 0.85rem;
}

.reset-section { display: none; }
.back-link { display: inline-block; margin-top: 12px; color: #C8A96E; font-size: 0.85rem; cursor: pointer; }

@media (max-width: 480px) {
    .auth-box { padding: 32px 24px; }
}
</style>
</head>
<body>

<div class="auth-header">
    <a href="../index.html" class="logo">ARCHINODE <span>건축을 잇다</span></a>
    <a href="signup.html" class="nav-link" data-en="Don't have an account? Sign up" data-ko="계정이 없으신가요? 회원가입">Don't have an account? Sign up</a>
</div>

<div class="auth-container">
    <div class="auth-box">
        <!-- LOGIN FORM -->
        <div id="loginSection">
            <h1 data-en="Welcome Back" data-ko="다시 오신 것을 환영합니다">Welcome Back</h1>
            <p class="subtitle" data-en="Log in to your ARCHINODE account." data-ko="ARCHINODE 계정에 로그인하세요.">Log in to your ARCHINODE account.</p>

            <div class="error-msg" id="loginError"></div>

            <form id="loginForm">
                <div class="field">
                    <label data-en="Email" data-ko="이메일">Email</label>
                    <input type="email" id="loginEmail" required placeholder="name@company.com">
                </div>
                <div class="field">
                    <label data-en="Password" data-ko="비밀번호">Password</label>
                    <input type="password" id="loginPassword" required placeholder="비밀번호 입력">
                </div>
                <button type="submit" class="auth-btn" id="loginBtn" data-en="Log In" data-ko="로그인">Log In</button>
            </form>

            <div class="auth-links">
                <a href="#" id="showReset" data-en="Forgot password?" data-ko="비밀번호를 잊으셨나요?">Forgot password?</a><br>
                <span data-en="Don't have an account?" data-ko="계정이 없으신가요?">Don't have an account?</span>
                <a href="signup.html" data-en="Sign up for free" data-ko="무료 회원가입">Sign up for free</a><br>
                <span data-en="Are you a brand?" data-ko="브랜드이신가요?">Are you a brand?</span>
                <a href="../brand-portal/login.html" data-en="Brand Portal" data-ko="브랜드 포털">Brand Portal</a>
            </div>
        </div>

        <!-- RESET PASSWORD -->
        <div id="resetSection" class="reset-section">
            <h1 data-en="Reset Password" data-ko="비밀번호 재설정">Reset Password</h1>
            <p class="subtitle" data-en="Enter your email to receive a password reset link." data-ko="비밀번호 재설정 링크를 받으려면 이메일을 입력하세요.">Enter your email to receive a password reset link.</p>
            <div class="error-msg" id="resetError"></div>
            <div class="success-msg" id="resetSuccess"></div>
            <form id="resetForm">
                <div class="field">
                    <label data-en="Email" data-ko="이메일">Email</label>
                    <input type="email" id="resetEmail" required placeholder="name@company.com">
                </div>
                <button type="submit" class="auth-btn" data-en="Send Reset Link" data-ko="재설정 링크 전송">Send Reset Link</button>
            </form>
            <span class="back-link" id="backToLogin"><i class="fas fa-arrow-left"></i> <span data-en="Back to login" data-ko="로그인으로 돌아가기">Back to login</span></span>
        </div>
    </div>
</div>

<script src="../firebase-config.js"></script>
<script src="../lang.js"></script>
<script>
// ── 세션 유지 ──
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(err => console.warn('Persistence error:', err));

// ── 이미 로그인 상태면 리디렉션 ──
auth.onAuthStateChanged(user => {
    if (user) {
        if (isAdmin(user.email)) {
            window.location.href = '../admin/dashboard.html';
            return;
        }
        db.collection('brands').doc(user.uid).get().then(doc => {
            if (doc.exists) {
                window.location.href = '../brand-portal/dashboard.html';
            } else {
                window.location.href = 'profile.html';
            }
        });
    }
});

// ── 로그인 ──
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errorDiv = document.getElementById('loginError');
    errorDiv.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Logging in...';

    try {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        await auth.signInWithEmailAndPassword(email, password);
        // onAuthStateChanged가 리디렉션 처리
    } catch (error) {
        btn.disabled = false;
        btn.textContent = 'Log In';
        errorDiv.style.display = 'block';
        if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
            errorDiv.textContent = '이메일 또는 비밀번호가 올바르지 않습니다. / Invalid email or password.';
        } else {
            errorDiv.textContent = error.message;
        }
    }
});

// ── 비밀번호 재설정 ──
document.getElementById('showReset').addEventListener('click', (e) => {
    e.preventDefault();
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('resetSection').style.display = 'block';
});
document.getElementById('backToLogin').addEventListener('click', () => {
    document.getElementById('resetSection').style.display = 'none';
    document.getElementById('loginSection').style.display = 'block';
});
document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('resetEmail').value.trim();
    const errorDiv = document.getElementById('resetError');
    const successDiv = document.getElementById('resetSuccess');
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';
    try {
        await auth.sendPasswordResetEmail(email);
        successDiv.style.display = 'block';
        successDiv.textContent = '재설정 이메일을 전송했습니다! / Password reset email sent!';
    } catch (error) {
        errorDiv.style.display = 'block';
        errorDiv.textContent = '이메일 전송에 실패했습니다. 이메일을 확인해주세요. / Could not send reset email.';
    }
});
</script>
</body>
</html>
